function changeMonth(delta) {
  let y = parseInt(currentYm.slice(0,4));
  let m = parseInt(currentYm.slice(4,6));
  m += delta;
  if (m > 12) { m = 1; y += 1; }

function render() {
  const y = currentYm.slice(0,4);
  const m = parseInt(currentYm.slice(4,6));
  document.getElementById('ym-label').textContent = y + '年' + m + '月';
  const body = document.getElementById('calendar-body');
  const monthData = calendarData[currentYm];
  if (!monthData) {
    body.innerHTML = '<div class="no-race">この月の開催データはありません</div>';
    return;
  }
  const days = Object.keys(monthData).map(Number).sort((a,b)=>a-b);
  let html = '';
  for (const d of days) {
    const venues = monthData[d];
    const dateObj = new Date(parseInt(y), m-1, d);
    const wd = dateObj.getDay();
    const wdLabel = ['日','月','火','水','木','金','土'][wd];
    const wdClass = wd === 0 ? 'sun' : (wd === 6 ? 'sat' : '');

  }
  body.innerHTML = html;
}
