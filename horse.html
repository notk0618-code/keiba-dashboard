<html><head><meta charset="utf-8"><meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: sans-serif; background:#f5f5f5; margin:0; padding:12px; max-width:520px; margin-left:auto; margin-right:auto; box-sizing:border-box; }
  input[type=text] { width:100%; box-sizing:border-box; padding:10px; font-size:16px; border:1px solid #ccc; border-radius:8px; margin-bottom:12px; }
  .result-item { background:#fff; border:1px solid #ddd; border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:pointer; }
  .result-item:active { background:#eef; }
  .race-row { border-bottom:1px solid #eee; padding:8px 0; font-size:13px; }
  .race-row:last-child { border-bottom:none; }
  .race-row a { color:#185fa5; text-decoration:none; font-weight:bold; }
  .back-link { display:inline-block; margin-bottom:12px; color:#185fa5; text-decoration:none; font-size:14px; }
  h2 { font-size:16px; margin:16px 0 8px; }
  .loading { color:#888; font-size:14px; padding:20px 0; text-align:center; }
  .af-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; margin-left:4px; }
  .af-good { background:#d4edda; color:#155724; }
  .af-bad { background:#f8d7da; color:#721c24; }
</style>
</head><body><div id="top" style="background:#000; margin:-12px -12px 0 -12px; padding:14px 16px; border-bottom:3px solid #ff6600; display:flex; justify-content:space-between; align-items:center; font-family:sans-serif;">
<a href="index.html" style="color:#fff; font-weight:bold; font-size:17px; letter-spacing:0.5px; text-decoration:none;">AF<span style="color:#ff6600;">Keiba</span>DATA</a>
<div style="display:flex; gap:14px;">

<a href="calendar.html" style="color:#ddd; text-decoration:none; font-size:12px;">📅 カレンダー</a>
<a href="horse.html" style="color:#ddd; text-decoration:none; font-size:12px;">🔍 検索</a>
</div>
</div>
<div style="height:14px;"></div>
<h2>🔍 馬名検索</h2>
<input type="text" id="searchBox" placeholder="馬名を入力(部分一致)" autocomplete="off">
<div id="resultsArea"></div>

<script>
let horseData = null;
let loadingPromise = null;

function loadData() {
  if (loadingPromise) return loadingPromise;
  document.getElementById('resultsArea').innerHTML = '<div class="loading">データ読み込み中(初回のみ時間がかかります)…</div>';
  loadingPromise = fetch('horse_data.json').then(r => r.json()).then(data => {
    horseData = data;
    return data;
  });
  return loadingPromise;
}

function raceRowHtml(e) {
  const [date, venue, distance, raceName, finish, weight, track, surface, af, pace, dashDate, rNum, archiveKey] = e;
  let raceNameDisplay = raceName;
  if (archiveKey) {
    raceNameDisplay = '<a href="race.html?key=' + encodeURIComponent(archiveKey) + '">' + raceName + '</a>';
  } else if (dashDate) {
    raceNameDisplay = '<a href="dashboard_' + dashDate + '.html#' + venue + '_' + rNum + '">' + raceName + '</a>';
  }
  let afDisplay = '';
  if (af !== null) {
    const cls = af < 0 ? 'af-good' : 'af-bad';
    afDisplay = '<span class="af-badge ' + cls + '">AF ' + af.toFixed(2) + '%</span>';
  }
  let paceDisplay = pace ? ' / ' + pace : '';
  return '<div class="race-row">' + date + ' ' + venue + distance + 'm(' + surface + ') ' +
         raceNameDisplay + ' / ' + finish + '着 / 馬場:' + (track || '-') + paceDisplay + afDisplay + '</div>';
}

function showHorseDetail(name) {
  const races = horseData[name];
  let html = '<a href="#" onclick="renderSearchResults(document.getElementById(\'searchBox\').value); return false;" class="back-link">‹ 検索結果に戻る</a>';
  html += '<h2>' + name + '(' + races.length + '走)</h2>';
  races.forEach(e => { html += raceRowHtml(e); });
  document.getElementById('resultsArea').innerHTML = html;
}

function renderSearchResults(query) {
  if (!query || query.length < 1) {
    document.getElementById('resultsArea').innerHTML = '';
    return;
  }
  const matches = Object.keys(horseData).filter(name => name.includes(query)).slice(0, 50);
  if (matches.length === 0) {
    document.getElementById('resultsArea').innerHTML = '<div class="loading">該当する馬が見つかりません</div>';
    return;
  }
  let html = '';
  matches.forEach(name => {
    html += '<div class="result-item" onclick="showHorseDetail(\'' + name.replace(/'/g, "\\'") + '\')">' + name + '(' + horseData[name].length + '走)</div>';
  });
  document.getElementById('resultsArea').innerHTML = html;
}

function getParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

document.getElementById('searchBox').addEventListener('input', function(e) {
  const query = e.target.value;
  if (!horseData) {
    loadData().then(() => renderSearchResults(query));
  } else {
    renderSearchResults(query);
  }
});

const initialName = getParam('name');
if (initialName) {
  loadData().then(() => showHorseDetail(initialName));
}
</script>
</body></html>
